name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: scripts/quality_gate.sh
      - run: scripts/release.sh
      - run: scripts/check-homebrew-formula.sh
