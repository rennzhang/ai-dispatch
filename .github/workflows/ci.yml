name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false
      - run: AI_DISPATCH_GO_PROVIDER_EXECUTION=off go test ./...
      - run: scripts/go_active_caller_check.sh
      - run: bash -n scripts/install-remote.sh scripts/release.sh skills/ai-dispatch/scripts/ai-dispatch
      - run: scripts/release.sh
